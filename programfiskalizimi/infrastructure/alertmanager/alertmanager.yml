global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@tafa.al'
  smtp_auth_username: 'alerts@tafa.al'
  smtp_auth_password: 'YOUR_SMTP_PASSWORD'  # Change this!

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'team-alerts'
  routes:
    - match:
        severity: critical
      receiver: 'team-critical'
      continue: true

    - match:
        severity: warning
      receiver: 'team-alerts'

receivers:
  - name: 'team-alerts'
    email_configs:
      - to: 'team@tafa.al'
        send_resolved: true

  - name: 'team-critical'
    email_configs:
      - to: 'oncall@tafa.al'
        send_resolved: true
    webhook_configs:
      - url: 'http://localhost:5001/alerts'  # Your webhook endpoint

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']
