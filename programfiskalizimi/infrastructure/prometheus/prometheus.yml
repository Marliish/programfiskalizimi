global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'tafa-platform'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Node Exporter - System metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'system'

  # PostgreSQL Exporter - Database metrics
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'database'
          database: 'postgresql'

  # Redis Exporter - Cache metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'cache'
          database: 'redis'

  # Application metrics (when deployed)
  - job_name: 'tafa-backend'
    static_configs:
      - targets: ['tafa-backend:3001']
        labels:
          service: 'backend'
          app: 'tafa'

  - job_name: 'tafa-frontend'
    static_configs:
      - targets: ['tafa-frontend:3000']
        labels:
          service: 'frontend'
          app: 'tafa'

  # Vault metrics
  - job_name: 'vault'
    static_configs:
      - targets: ['vault:8200']
        labels:
          service: 'vault'
