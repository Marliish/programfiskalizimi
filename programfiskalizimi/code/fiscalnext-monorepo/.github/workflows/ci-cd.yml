name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '8'

jobs:
  # Lint and Type Check
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      
      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Lint
        run: pnpm lint
      
      - name: Type check
        run: |
          pnpm --filter @fiscalnext/api run type-check || true
          pnpm --filter @fiscalnext/web-admin run type-check
          pnpm --filter @fiscalnext/web-pos run type-check

  # Backend Tests
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: fiscalnext_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Generate Prisma Client
        run: pnpm --filter @fiscalnext/database prisma generate
      
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/fiscalnext_test
        run: pnpm --filter @fiscalnext/database prisma migrate deploy
      
      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/fiscalnext_test
          JWT_SECRET: test-secret
        run: pnpm --filter @fiscalnext/api test
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/api/coverage/coverage-final.json
          flags: backend

  # Frontend Build
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [web-admin, web-pos]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://api.example.com
        run: pnpm --filter @fiscalnext/${{ matrix.app }} build
      
      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sb apps/${{ matrix.app }}/.next | cut -f1)
          echo "Bundle size: $((BUNDLE_SIZE / 1024 / 1024)) MB"
          if [ $BUNDLE_SIZE -gt 524288000 ]; then
            echo "Bundle size exceeds 500MB!"
            exit 1
          fi

  # Security Audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Security audit
        run: pnpm audit --audit-level moderate || true
      
      - name: Check for vulnerabilities
        run: |
          pnpm audit --json > audit.json || true
          cat audit.json

  # Build Docker Images
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test-backend, build-frontend]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fiscalnext-api:latest
            ${{ secrets.DOCKER_USERNAME }}/fiscalnext-api:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/fiscalnext-api:latest
          cache-to: type=inline
      
      - name: Build and push Web Admin
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web-admin/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fiscalnext-web-admin:latest
            ${{ secrets.DOCKER_USERNAME }}/fiscalnext-web-admin:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/fiscalnext-web-admin:latest
          cache-to: type=inline
      
      - name: Build and push Web POS
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web-pos/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fiscalnext-web-pos:latest
            ${{ secrets.DOCKER_USERNAME }}/fiscalnext-web-pos:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/fiscalnext-web-pos:latest
          cache-to: type=inline

  # Deploy to Production
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-docker]
    environment:
      name: production
      url: https://your-domain.com
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /var/www/fiscalnext
            git pull origin main
            docker-compose pull
            docker-compose up -d --no-deps api
            sleep 10
            docker-compose up -d --no-deps web-admin
            docker-compose up -d --no-deps web-pos
            docker-compose exec -T api pnpm prisma migrate deploy
      
      - name: Verify deployment
        run: |
          sleep 30
          curl -f ${{ secrets.PRODUCTION_URL }}/api/health || exit 1
          echo "Deployment successful!"
      
      - name: Notify on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: 'Deployment failed!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # Performance Tests
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [deploy]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            ${{ secrets.PRODUCTION_URL }}
            ${{ secrets.PRODUCTION_URL }}/dashboard
            ${{ secrets.PRODUCTION_URL }}/products
          budgetPath: ./lighthouserc.json
          uploadArtifacts: true
