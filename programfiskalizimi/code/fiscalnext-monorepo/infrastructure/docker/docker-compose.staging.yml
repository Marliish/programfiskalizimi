# FiscalNext - Staging Environment
# Created: 2026-02-23 by DevOps (Max)
# Usage: docker-compose -f infrastructure/docker/docker-compose.staging.yml up -d

version: '3.9'

services:
  # PostgreSQL Database with backup
  postgres:
    image: postgres:15-alpine
    container_name: fiscalnext-postgres-staging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fiscalnext_staging}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fiscalnext-network
    restart: always

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fiscalnext-redis-staging
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fiscalnext-network
    restart: always

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fiscalnext-rabbitmq-staging
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - fiscalnext-network
    restart: always

  # API Backend
  api:
    image: ${DOCKER_REGISTRY:-fiscalnext}/api:${IMAGE_TAG:-latest}
    container_name: fiscalnext-api-staging
    environment:
      NODE_ENV: staging
      PORT: 5000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - fiscalnext-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Web Admin Frontend
  web-admin:
    image: ${DOCKER_REGISTRY:-fiscalnext}/web-admin:${IMAGE_TAG:-latest}
    container_name: fiscalnext-web-admin-staging
    environment:
      NODE_ENV: staging
      NEXT_PUBLIC_API_URL: ${API_URL}
      PORT: 3000
    depends_on:
      - api
    networks:
      - fiscalnext-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # POS Frontend
  web-pos:
    image: ${DOCKER_REGISTRY:-fiscalnext}/web-pos:${IMAGE_TAG:-latest}
    container_name: fiscalnext-web-pos-staging
    environment:
      NODE_ENV: staging
      NEXT_PUBLIC_API_URL: ${API_URL}
      PORT: 3001
    depends_on:
      - api
    networks:
      - fiscalnext-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: fiscalnext-nginx-staging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - web-admin
      - web-pos
    networks:
      - fiscalnext-network
    restart: always

  # Monitoring: Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: fiscalnext-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - fiscalnext-network
    restart: always

  # Monitoring: Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: fiscalnext-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - fiscalnext-network
    restart: always

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  fiscalnext-network:
    driver: bridge
    name: fiscalnext-network
